name: Lint

on: push

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: 3.8
          - os: ubuntu-latest
            python-version: 3.9
          - os: ubuntu-20.04
            python-version: 3.9.1
          - os: ubuntu-latest
            python-version: 3.10
          - os: ubuntu-latest
            python-version: 3.11
          - os: ubuntu-latest
            python-version: 3.12
          - os: ubuntu-latest
            python-version: 3.13
          - os: ubuntu-latest
            python-version: 3.14
          - os: ubuntu-latest
            python-version: 3.14t
          - os: ubuntu-latest
            python-version: 3.15.0-alpha.1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ github.workflow }}-${{ hashFiles('requirements_dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ github.workflow }}-
            ${{ runner.os }}-pip-${{ github.workflow }}-

      - name: Install dependencies
        run: pip install -r requirements_dev.txt

      - name: Install the library
        run: pip install .

      - name: Run ruff
        run: ruff check transfunctions

      - name: Run ruff for tests
        run: ruff check tests

      - name: Run mypy
        run: mypy --strict transfunctions

      - name: Run mypy for tests
        run: mypy tests --exclude typing
